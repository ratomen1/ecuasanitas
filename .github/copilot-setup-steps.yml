# GitHub Copilot Coding Agent — Setup Steps
# Este archivo configura el entorno que usa el agente de codificación
# cuando trabaja en este repositorio de scripts PostgreSQL/DBA.

name: "Copilot Setup Steps"

on: copilot_setup

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libpq-dev

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install psycopg2-binary openpyxl pandas

